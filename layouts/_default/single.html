{{ define "main" }}
<article class="post">
  <header>
    <h1>{{ .Title }}</h1>
    <div class="post-meta-header">
      {{- if not .Date.IsZero }}
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{- end }}
      {{- with .Params.tags }}
        {{- range . }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a>
        {{- end }}
      {{- end }}
      <a href="index.md" class="source-link">[md]</a>
    </div>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
